name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    env:
      MIX_ENV: test
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.20.2'
          otp-version: '29'
      - run: mix deps.get
      - run: mix compile --warnings-as-errors
      - run: mix test --warnings-as-errors
